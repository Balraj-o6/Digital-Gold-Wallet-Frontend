<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digital Gold Wallet — Portfolio Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com"
	crossorigin="anonymous" />
<link
	href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap"
	rel="stylesheet" />
<style>
*, *::before, *::after {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
}

:root {
	--gold: #C9A84C;
	--gold-light: #E8C96C;
	--gold-pale: #F5E9C4;
	--dark: #0D0D0D;
	--dark-card: #1C1C19;
	--border: rgba(201, 168, 76, .18);
	--text-muted: rgba(245, 233, 196, .45);
}

html, body {
	height: 100%;
	background: var(--dark);
	color: var(--gold-pale);
	font-family: 'Josefin Sans', sans-serif;
	letter-spacing: .04em;
	overflow-x: hidden;
}

body::before {
	content: '';
	position: fixed;
	inset: 0;
	background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201, 168, 76, .07)
		0%, transparent 60%),
		radial-gradient(ellipse 60% 80% at 80% 90%, rgba(201, 168, 76, .05) 0%,
		transparent 55%);
	pointer-events: none;
	z-index: 0;
}

.page {
	position: relative;
	z-index: 1;
	min-height: 100vh;
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	padding: 2rem;
}

.monogram {
	font-family: 'Cormorant Garamond', serif;
	font-size: clamp(3rem, 8vw, 5.5rem);
	font-weight: 300;
	color: var(--gold);
	line-height: 1;
	letter-spacing: .12em;
}

.monogram span {
	color: var(--gold-light);
	font-style: italic;
}

.tagline {
	font-size: .65rem;
	font-weight: 300;
	letter-spacing: .35em;
	text-transform: uppercase;
	color: var(--text-muted);
	margin-top: .6rem;
}

.divider {
	width: 80px;
	height: 1px;
	background: linear-gradient(90deg, transparent, var(--gold), transparent);
	margin: 2.5rem auto;
}

.card {
	width: 100%;
	max-width: 480px;
	background: var(--dark-card);
	border: 1px solid var(--border);
	border-radius: 4px;
	padding: 2.8rem 2.8rem 2.4rem;
	box-shadow: 0 24px 64px rgba(0, 0, 0, .55);
}

.card-title {
	font-family: 'Cormorant Garamond', serif;
	font-size: 1.25rem;
	font-weight: 400;
	color: var(--gold-light);
	letter-spacing: .1em;
	margin-bottom: 1.8rem;
}

.field {
	display: flex;
	flex-direction: column;
	gap: .6rem;
	margin-bottom: 1.6rem;
}

label {
	font-size: .6rem;
	font-weight: 300;
	letter-spacing: .3em;
	text-transform: uppercase;
	color: var(--text-muted);
}

input[type="number"] {
	background: rgba(255, 255, 255, .03);
	border: 1px solid var(--border);
	border-radius: 2px;
	color: var(--gold-pale);
	font-family: 'Josefin Sans', sans-serif;
	font-size: .85rem;
	letter-spacing: .08em;
	padding: .85rem 1rem;
	outline: none;
	transition: border-color .25s, box-shadow .25s;
	-moz-appearance: textfield;
	width: 100%;
}

input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button
	{
	-webkit-appearance: none;
}

input[type="number"]:focus {
	border-color: rgba(201, 168, 76, .55);
	box-shadow: 0 0 0 3px rgba(201, 168, 76, .08);
}

input[type="number"]::placeholder {
	color: var(--text-muted);
}

button[type="submit"] {
	width: 100%;
	background: linear-gradient(135deg, #B8922E 0%, #E0B84A 50%, #B8922E 100%);
	border: none;
	border-radius: 2px;
	color: var(--dark);
	cursor: pointer;
	font-family: 'Josefin Sans', sans-serif;
	font-size: .65rem;
	font-weight: 400;
	letter-spacing: .35em;
	text-transform: uppercase;
	padding: 1rem;
	transition: box-shadow .3s;
}

button[type="submit"]:hover {
	box-shadow: 0 8px 24px rgba(201, 168, 76, .25);
}

.alert {
	display: flex;
	align-items: flex-start;
	gap: .8rem;
	background: rgba(180, 60, 60, .1);
	border: 1px solid rgba(200, 80, 80, .25);
	border-radius: 3px;
	color: #F4A0A0;
	font-size: .75rem;
	letter-spacing: .05em;
	line-height: 1.5;
	padding: .9rem 1rem;
	margin-bottom: 1.6rem;
}

.alert-icon {
	flex-shrink: 0;
	width: 14px;
	height: 14px;
	margin-top: 1px;
	fill: #F4A0A0;
}

.footer {
	margin-top: 3rem;
	font-size: .58rem;
	letter-spacing: .25em;
	text-transform: uppercase;
	color: var(--text-muted);
}
</style>
</head>
<body>
	<div class="page">

		<div class="monogram">
			DG<span>W</span>
		</div>
		<p class="tagline">Digital Gold Wallet &nbsp;·&nbsp; Portfolio
			</p>

		<div class="divider"></div>

		<div class="card">
			<p class="card-title">Retrieve User Portfolio</p>

			<div class="alert" th:if="${errorMessage}">
				<svg class="alert-icon" viewBox="0 0 20 20">
					<path
						d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 5a1 1 0 011 1v3a1 1 0 01-2 0V8a1 1 0 011-1zm0 7a1 1 0 110-2 1 1 0 010 2z" /></svg>
				<span th:text="${errorMessage}">Error message here.</span>
			</div>

			<form action="/portfolio" method="get">
				<div class="field">
					<label for="userId">User ID</label> <input type="number"
						id="userId" name="userId" placeholder="Enter a numeric user ID"
						th:value="${userId}" min="1" required autofocus />
				</div>
				<button type="submit">View Portfolio</button>
			</form>
		</div>

		<p class="footer">Backed by Digital Gold Wallet API &nbsp;·&nbsp;
			v1.0</p>
	</div>
</body>
</html>
