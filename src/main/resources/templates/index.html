<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Digital Gold Wallet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            background-color: white;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 6px;
        }

        h3 {
            text-align: center;
            color: #777;
            font-weight: normal;
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #DAA520;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #B8860B;
        }

        .error {
            background-color: #ffe0e0;
            border: 1px solid #f5a0a0;
            color: #cc0000;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Digital Gold Wallet</h2>
    <h3>View User Portfolio</h3>

    <div class="error" th:if="${errorMessage}">
        <strong>Error:</strong> <span th:text="${errorMessage}">Something went wrong.</span>
    </div>

    <form action="/portfolio" method="get">
        <label for="userId">Enter User ID:</label>
        <input
            type="number"
            id="userId"
            name="userId"
            placeholder="e.g. 1"
            th:value="${userId}"
            min="1"
            required
            autofocus
        />
        <button type="submit">Get Portfolio</button>
    </form>
</div>

</body>
</html>
